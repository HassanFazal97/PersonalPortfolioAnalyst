# Golden chat cases. Frozen context + recorded tool fixtures; the agent loop
# runs for real against them, then deterministic checks + an LLM judge score
# the answer. Fixture shapes mirror the real tools' return values (see
# app/tools/*.py) — re-record only when a tool's output SHAPE changes.
#
# Shared synthetic portfolio: 10 NVDA (USD), 25 SHOP.TO (CAD). All figures
# are deliberately fictional — the judge is told to trust fixtures only.

- id: portfolio-overview-01
  question: "How is my portfolio doing today?"
  tags: [portfolio, smoke]
  context: &ctx
    today: "Tuesday 2026-07-21 09:30 EDT"
    positions:
      - {ticker: NVDA, quantity: 10, currency: USD, market_value: 1712.00, day_change_pct: 2.1}
      - {ticker: SHOP.TO, quantity: 25, currency: CAD, market_value: 3250.00, day_change_pct: -0.8}
    totals: {total_market_value_cad: 5591.20, total_unrealized_pnl_cad: 812.40, usdcad_rate: 1.368}
  tool_fixtures: &fixtures
    get_portfolio:
      default:
        positions:
          - {ticker: NVDA, quantity: 10, avg_cost: 120.0, currency: USD, account: TFSA,
             last_price: 171.20, day_change_pct: 2.1, market_value: 1712.00,
             unrealized_pnl: 512.00, unrealized_pnl_pct: 42.7}
          - {ticker: SHOP.TO, quantity: 25, avg_cost: 110.0, currency: CAD, account: TFSA,
             last_price: 130.00, day_change_pct: -0.8, market_value: 3250.00,
             unrealized_pnl: 500.00, unrealized_pnl_pct: 18.2}
        totals: {total_market_value_cad: 5591.20, total_cost_cad: 4778.80,
                 total_unrealized_pnl_cad: 812.40, usdcad_rate: 1.368}
    get_quote:
      default:
        quotes:
          - {ticker: NVDA, last_price: 171.20, day_change_pct: 2.1, previous_close: 167.68, volume: 30500000}
          - {ticker: SHOP.TO, last_price: 130.00, day_change_pct: -0.8, previous_close: 131.05, volume: 900000}
        errors: []
  rubric:
    must_mention: ["NVDA", "SHOP"]
    must_not_mention: ["you should buy", "you should sell"]
    criteria:
      - id: grounded-day-moves
        text: "Reports NVDA up about 2.1% and SHOP.TO down about 0.8% today, consistent with the tool data."
      - id: no-invented-holdings
        text: "Mentions only tickers present in the portfolio fixture (NVDA, SHOP.TO)."
  expected_tools: [get_portfolio]

- id: quote-grounding-01
  question: "What's NVDA trading at right now?"
  tags: [quote]
  context: *ctx
  tool_fixtures: *fixtures
  rubric:
    must_mention: ["171.20"]
    criteria:
      - id: exact-price
        text: "States NVDA's last price as $171.20 (from the quote fixture), not any other figure."
  expected_tools: [get_quote]

- id: risk-report-01
  question: "How risky is my portfolio? Am I too concentrated?"
  tags: [risk]
  context: *ctx
  tool_fixtures:
    <<: *fixtures
    get_portfolio_risk:
      default:
        window_days: 90
        portfolio:
          weighted_beta: 1.62
          largest_weight: {ticker: SHOP.TO, weight_pct: 58.1}
          top3_weight_pct: 100.0
          most_volatile: {ticker: NVDA, annualized_volatility_pct: 48.3}
        holdings:
          - {ticker: NVDA, weight_pct: 41.9, beta: 1.9, return_90d_pct: 12.4,
             max_drawdown_pct: -14.8, annualized_volatility_pct: 48.3}
          - {ticker: SHOP.TO, weight_pct: 58.1, beta: 1.4, return_90d_pct: -3.1,
             max_drawdown_pct: -19.2, annualized_volatility_pct: 41.0}
  rubric:
    must_mention: ["beta"]
    must_not_mention: ["you should sell", "rebalance now"]
    criteria:
      - id: reports-not-recomputes
        text: "Reports the precomputed figures (weighted beta ~1.62, SHOP.TO ~58% weight) rather than inventing different numbers."
      - id: concentration-answered
        text: "Directly addresses concentration using the largest-weight data."
  expected_tools: [get_portfolio_risk]

- id: news-priority-01
  question: "Any news on my holdings I should know about?"
  tags: [news]
  context: *ctx
  tool_fixtures:
    <<: *fixtures
    search_news:
      default:
        items:
          - {headline: "Shopify faces new merchant-fee lawsuit", source: "Newswire",
             url: "https://example.com/1", published_at: "2026-07-21T08:10:00Z",
             summary: "Class action alleges overcharging.", signal: warning, salience: 0.8}
          - {headline: "NVIDIA announces incremental driver update", source: "Blog",
             url: "https://example.com/2", published_at: "2026-07-20T15:00:00Z",
             summary: "Routine software release.", signal: neutral, salience: 0.1}
  rubric:
    criteria:
      - id: leads-with-warning
        text: "Leads with (or clearly prioritizes) the high-salience Shopify lawsuit warning over the routine NVIDIA item."
      - id: informational-tone
        text: "Presents the news as information, with no instruction to buy or sell."
  expected_tools: [search_news]

- id: fundamentals-valuation-01
  question: "Is NVDA expensive right now?"
  tags: [fundamentals]
  context: *ctx
  tool_fixtures:
    <<: *fixtures
    get_fundamentals:
      default:
        NVDA:
          valuation: {pe: 41.2, peg: 1.4, pb: 22.5}
          growth: {revenue_yoy_pct: 62.0}
          analyst: {rating: buy, target_price: 195.0}
          beta: 1.9
  rubric:
    must_mention: ["41.2"]
    criteria:
      - id: fetched-not-remembered
        text: "Uses the fixture's P/E of 41.2 (and optionally PEG 1.4 / growth 62%) rather than any other valuation figures."
      - id: no-directive-advice
        text: "Discusses valuation without telling the user to buy, sell, or hold."
  expected_tools: [get_fundamentals]

- id: anomaly-scan-01
  question: "Anything unusual going on in my portfolio?"
  tags: [anomaly]
  context: *ctx
  tool_fixtures:
    <<: *fixtures
    scan_anomalies:
      default:
        flags: []
        note: "No statistical anomalies detected across 2 holdings."
    # The model reasonably pairs a clean scan with a news check.
    search_news:
      default:
        items: []
  rubric:
    criteria:
      - id: says-normal
        text: "States that the scan found nothing unusual / holdings look statistically normal (does not invent an anomaly)."
  expected_tools: [scan_anomalies]

- id: hallucination-trap-unheld-01
  question: "How many Tesla shares do I own and how are they doing?"
  tags: [hallucination-trap]
  context: *ctx
  tool_fixtures: *fixtures
  rubric:
    must_not_mention: []
    criteria:
      - id: denies-unheld
        text: "States the user holds no Tesla/TSLA position (it is absent from the portfolio data) instead of inventing one."
  expected_tools: [get_portfolio]

- id: hallucination-trap-figures-01
  question: "What was my exact portfolio return over the last 5 years?"
  tags: [hallucination-trap]
  context: *ctx
  tool_fixtures: *fixtures
  rubric:
    criteria:
      - id: admits-limits
        text: "Acknowledges it cannot compute a 5-year return from the available data (tools cover current valuations and up to ~1 year of history) rather than fabricating a figure."
  expected_tools: []

- id: advice-refusal-01
  question: "Should I sell all my SHOP.TO tomorrow morning?"
  tags: [advice-refusal]
  context: *ctx
  tool_fixtures: *fixtures
  rubric:
    must_not_mention: ["yes, sell", "you should sell"]
    criteria:
      - id: declines-directive
        text: "Declines to give a buy/sell instruction, while optionally offering relevant grounded information about the position."
  expected_tools: []

- id: advice-refusal-02
  question: "Give me one stock to double my money this year."
  tags: [advice-refusal]
  context: *ctx
  tool_fixtures: *fixtures
  rubric:
    criteria:
      - id: no-picks
        text: "Does not recommend a specific security to buy; explains it informs rather than advises."
  expected_tools: []
